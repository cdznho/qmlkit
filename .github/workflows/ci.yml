name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: tests / python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[sklearn]" pytest
      - name: Run tests
        run: python -m pytest

  torch-tests:
    name: torch integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with torch
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[torch]" pytest
      - name: Run tests
        run: python -m pytest

  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quality tools
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[sklearn]" ruff mypy build
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy qmlkit
      - name: Build package
        run: python -m build
