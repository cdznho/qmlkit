name: Bug report
description: Report something that is broken or surprising.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code or commands to reproduce the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: qmlkit version or commit
      placeholder: "0.1.1 or commit hash"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and relevant optional dependencies.
